<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh Pro - Preview</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
      margin: 0;
    }
    .preview-wrapper {
      position: relative;
    }
    .preview-label {
      position: absolute;
      top: -36px;
      left: 0;
      right: 0;
      text-align: center;
      color: #64748b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .preview-frame {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(59, 130, 246, 0.05);
    }
    .preview-note {
      text-align: center;
      color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <div class="preview-label">Chrome Extension Popup Preview</div>
    <div class="preview-frame">
      <div class="container" style="width: 360px;">
        <!-- Header -->
        <header class="header">
          <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            <span>Auto Refresh Pro</span>
          </div>
          <div class="status-badge running" id="statusBadge">
            <span class="status-dot"></span>
            <span class="status-text">运行中</span>
          </div>
        </header>

        <!-- Timer Display -->
        <div class="timer-section">
          <div class="timer-ring" id="timerRing">
            <svg viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="54" class="ring-bg"/>
              <circle cx="60" cy="60" r="54" class="ring-progress" id="ringProgress" style="stroke-dasharray: 339.292; stroke-dashoffset: 113;"/>
            </svg>
            <div class="timer-text">
              <span class="timer-count" id="timerCount">42</span>
              <span class="timer-label">秒</span>
            </div>
          </div>
          <div class="refresh-count">
            <span>已刷新</span>
            <strong id="refreshCount">7</strong>
            <span>次 / 上限 20 次</span>
          </div>
        </div>

        <!-- Interval Setting -->
        <div class="control-section">
          <label class="field-label">刷新间隔（秒）</label>
          <div class="interval-input-group">
            <button class="btn-icon" title="减少">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <input type="number" value="60" class="interval-input">
            <button class="btn-icon" title="增加">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div class="quick-presets">
            <button class="preset-btn">10s</button>
            <button class="preset-btn">30s</button>
            <button class="preset-btn active">60s</button>
            <button class="preset-btn">2m</button>
            <button class="preset-btn">5m</button>
          </div>
        </div>

        <!-- Max Refresh Count -->
        <div class="control-section">
          <label class="field-label">刷新次数上限</label>
          <div class="count-input-group">
            <input type="number" value="20" class="count-input" placeholder="0 = 无限制">
            <span class="count-hint">0 表示无限制</span>
          </div>
        </div>

        <!-- Mode Selection -->
        <div class="control-section">
          <label class="field-label">刷新模式</label>
          <div class="mode-tabs">
            <button class="mode-tab active">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
              </svg>
              全页刷新
            </button>
            <button class="mode-tab">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9l6 6 6-6"/>
              </svg>
              XPath 点击
            </button>
          </div>
        </div>

        <!-- Control Buttons -->
        <div class="action-section">
          <button class="btn-start hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            启动刷新
          </button>
          <button class="btn-stop">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
            </svg>
            停止刷新
          </button>
        </div>

        <!-- Log -->
        <div class="log-section">
          <label class="field-label">运行日志</label>
          <div class="log-list">
            <div class="log-item info">
              <span class="log-time">14:32:45</span>
              <span class="log-msg">间隔已热切换为 60 秒</span>
            </div>
            <div class="log-item success">
              <span class="log-time">14:32:18</span>
              <span class="log-msg">第 7 次刷新完成</span>
            </div>
            <div class="log-item success">
              <span class="log-time">14:31:18</span>
              <span class="log-msg">第 6 次刷新完成</span>
            </div>
            <div class="log-item info">
              <span class="log-time">14:26:18</span>
              <span class="log-msg">已启动 - 间隔 60 秒, 模式: 全页刷新, 上限 20 次</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="preview-note">* 这是插件弹窗的预览效果，实际使用时在浏览器中加载插件即可</div>
  </div>

  <script>
    // Simple animation demo for the preview
    let count = 42;
    const timerEl = document.getElementById('timerCount');
    const ringEl = document.getElementById('ringProgress');
    const circumference = 2 * Math.PI * 54;

    setInterval(() => {
      count--;
      if (count < 0) count = 60;
      timerEl.textContent = count;
      const offset = circumference - (count / 60) * circumference;
      ringEl.style.strokeDashoffset = offset;
    }, 1000);
  </script>
</body>
</html>
