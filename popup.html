<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
          </svg>
          <span>Auto Refresh Pro</span>
        </div>
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span class="status-text">已停止</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-start" id="startBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          启动
        </button>
        <button class="btn-stop hidden" id="stopBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
          停止
        </button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="interval">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        刷新间隔
      </button>
      <button class="tab-btn" data-tab="sites">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        监控网址
      </button>
      <button class="tab-btn" data-tab="log">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        运行日志
      </button>
    </div>

    <div class="tab-content" id="intervalTab">
      <div class="timer-section">
        <div class="timer-ring" id="timerRing">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" class="ring-bg"/>
            <circle cx="60" cy="60" r="54" class="ring-progress" id="ringProgress"/>
          </svg>
          <div class="timer-text">
            <span class="timer-count" id="timerCount">60</span>
            <span class="timer-label">秒</span>
          </div>
        </div>
      </div>

      <div class="control-section">
        <label class="field-label">刷新间隔（秒）</label>
        <div class="interval-input-group">
          <button class="btn-icon" id="decreaseBtn" title="减少">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <input type="number" id="intervalInput" min="1" max="86400" value="60" class="interval-input">
          <button class="btn-icon" id="increaseBtn" title="增加">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="quick-presets">
          <button class="preset-btn" data-value="10">10s</button>
          <button class="preset-btn" data-value="30">30s</button>
          <button class="preset-btn active" data-value="60">60s</button>
          <button class="preset-btn" data-value="120">2m</button>
          <button class="preset-btn" data-value="300">5m</button>
        </div>
      </div>

      <div class="control-section">
        <label class="field-label">刷新次数上限</label>
        <div class="count-input-group">
          <input type="number" id="maxCountInput" min="0" max="99999" value="0" class="count-input" placeholder="0 = 无限制">
          <span class="count-hint">0 表示无限制</span>
          <span class="refresh-count">
            已刷新 <strong id="refreshCount">0</strong> 次
          </span>
        </div>
      </div>

      <div class="control-section">
        <label class="field-label">刷新模式</label>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="full">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            全页刷新
          </button>
          <button class="mode-tab" data-mode="xpath">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
            XPath 点击
          </button>
        </div>
      </div>

      <div class="xpath-section hidden" id="xpathSection">
        <label class="field-label">XPath 表达式</label>
        <div class="xpath-input-group">
          <input type="text" id="xpathInput" placeholder="输入或选取 XPath..." class="xpath-input">
          <button class="btn-pick" id="pickXpathBtn" title="从页面选取元素">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            </svg>
            选取
          </button>
        </div>
        <div class="xpath-hint" id="xpathHint">
          点击"选取"后在页面上点击目标元素
        </div>

        <div class="iframe-section hidden" id="iframeSection">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            目标框架
          </label>
          <select id="frameSelect" class="frame-select">
            <option value="top">主页面</option>
          </select>
          <div class="iframe-hint hidden" id="iframeHint">检测到页面包含 iframe</div>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="sitesTab">
      <div class="sites-section">
        <div class="sites-list" id="sitesList">
          <div class="sites-empty">暂无监控网址<br><span>选取 XPath 后自动记录</span></div>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="logTab">
      <div class="log-section">
        <div class="log-list" id="logList">
          <div class="log-empty">暂无日志</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
