<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
          </svg>
          <span>Auto Refresh Pro</span>
        </div>
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span class="status-text">已停止</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-start" id="startBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          启动
        </button>
        <button class="btn-stop hidden" id="stopBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
          停止
        </button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="interval">间隔</button>
      <button class="tab-btn" data-tab="monitor">监控</button>
      <button class="tab-btn" data-tab="sites">标签</button>
      <button class="tab-btn" data-tab="log">日志</button>
    </div>

    <div class="tab-content" id="intervalTab">
      <div class="timer-section">
        <div class="timer-ring" id="timerRing">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" class="ring-bg"/>
            <circle cx="60" cy="60" r="54" class="ring-progress" id="ringProgress"/>
          </svg>
          <div class="timer-text">
            <span class="timer-count" id="timerCount">60</span>
            <span class="timer-label">秒</span>
          </div>
        </div>
      </div>

      <div class="control-section">
        <label class="field-label">刷新间隔（秒）</label>
        <div class="interval-input-group">
          <button class="btn-icon" id="decreaseBtn" title="减少">-</button>
          <input type="number" id="intervalInput" min="1" max="86400" value="60" class="interval-input">
          <button class="btn-icon" id="increaseBtn" title="增加">+</button>
        </div>
        <div class="quick-presets">
          <button class="preset-btn" data-value="10">10s</button>
          <button class="preset-btn" data-value="30">30s</button>
          <button class="preset-btn active" data-value="60">60s</button>
          <button class="preset-btn" data-value="120">2m</button>
          <button class="preset-btn" data-value="300">5m</button>
        </div>
      </div>

      <div class="control-section">
        <label class="field-label">刷新上限</label>
        <div class="count-input-group">
          <input type="number" id="maxCountInput" min="0" max="99999" value="0" class="count-input" placeholder="0 = 无限制">
          <span class="count-hint">0 表示无限制</span>
          <span class="refresh-count">已刷新 <strong id="refreshCount">0</strong> 次</span>
        </div>
      </div>

      <div class="control-section">
        <div class="section-header">
          <label class="field-label">
            悬浮窗口
            <span class="help-wrap">
              <span class="help-icon">?</span>
              <span class="tooltip">在网页右下角显示快捷刷新控制窗</span>
            </span>
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="floatWindowToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="monitorTab">
      <div class="control-section">
        <label class="field-label">刷新模式</label>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="full">全页刷新</button>
          <button class="mode-tab" data-mode="xpath">XPath 点击</button>
        </div>
      </div>

      <div class="xpath-section hidden" id="xpathSection">
        <label class="field-label">点击目标 XPath</label>
        <div class="xpath-input-group">
          <input type="text" id="xpathInput" placeholder="输入或选取 XPath..." class="xpath-input">
          <button class="btn-pick" id="pickXpathBtn" title="从页面选取元素">选取</button>
        </div>
        <div class="xpath-hint" id="xpathHint">点击“选取”后在页面上点击目标元素</div>
      </div>

      <div class="control-section">
        <div class="section-header">
          <label class="field-label">监控变化</label>
          <label class="toggle-switch">
            <input type="checkbox" id="monitorToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="monitor-content hidden" id="monitorContent">
          <label class="field-label sub-label">监控区域 XPath</label>
          <div class="xpath-input-group">
            <input type="text" id="monitorXpathInput" placeholder="输入或选取监控区域 XPath..." class="xpath-input">
            <button class="btn-pick" id="pickMonitorXpathBtn" title="从页面选取监控区域">选取</button>
          </div>
          <div class="xpath-hint" id="monitorXpathHint">点击“选取”后在页面上选择监控区域</div>

          <div class="notify-options">
            <label class="notify-option">
              <label class="toggle-switch small">
                <input type="checkbox" id="voiceNotifyToggle">
                <span class="toggle-slider"></span>
              </label>
              <span>语音通知</span>
            </label>
            <label class="notify-option">
              <label class="toggle-switch small">
                <input type="checkbox" id="popupNotifyToggle">
                <span class="toggle-slider"></span>
              </label>
              <span>弹窗通知</span>
            </label>
          </div>
          <div class="notify-message-field">
            <label class="field-label sub-label" for="monitorNotifyMessageInput">
              弹窗通知内容
              <span class="help-wrap">
                <span class="help-icon">?</span>
                <span class="tooltip">开启弹窗通知后，将通过浏览器系统通知显示。</span>
              </span>
            </label>
            <textarea id="monitorNotifyMessageInput" class="notify-message-input" maxlength="120" rows="2" placeholder="监控区域发生变化，请及时查看。" disabled></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="sitesTab">
      <div class="sites-section">
        <div class="sites-list" id="sitesList">
          <div class="sites-empty">暂无运行中的标签<br><span>启动刷新后自动显示当前网站</span></div>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="logTab">
      <div class="log-section">
        <div class="log-timer hidden" id="logTimer">
          <div class="log-timer-label">刷新倒计时</div>
          <div class="log-timer-count">--</div>
          <div class="log-timer-unit">秒</div>
        </div>
        <div class="log-list" id="logList">
          <div class="log-empty">暂无日志</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
